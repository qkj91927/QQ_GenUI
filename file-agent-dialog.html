<!doctype html>
<html lang="zh-CN" data-theme="qq-light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文件助手对话页</title>
  <link rel="stylesheet" href="css/Qdesign%20Tokens.css">
  <link rel="stylesheet" href="css/Qdesign%20Color%20Tokens.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg-secondary);
      font-family: var(--font-family);
      color: var(--text-primary);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      background: transparent;
      padding: 0;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .phone {
      width: var(--device-width);
      height: var(--device-screen-height);
      position: relative;
      overflow: hidden;
      background: var(--bg-select);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
    }

    .status-bar {
      width: var(--device-width);
      height: var(--device-status-bar-height);
      background: var(--bg-select);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px 0 30px;
    }

    .status-time {
      width: 54px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: var(--typo-title-2xs);
      font-weight: 600;
      line-height: 22px;
    }

    .dynamic-island {
      width: 126px;
      height: 37px;
      border-radius: var(--radius-full);
      background: var(--text-primary);
      transform: translateX(-8px);
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-icons img {
      display: block;
      height: 13px;
      max-width: 25px;
    }

    .navbar-row {
      width: var(--device-width);
      height: 44px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--spacing-l);
      background: var(--bg-select);
      z-index: 5;
    }

    .left-area,
    .right-area {
      min-width: 60px;
      height: 44px;
      display: flex;
      align-items: center;
      z-index: 2;
    }

    .right-area {
      justify-content: flex-end;
      gap: var(--spacing-m);
    }

    .middle-area {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 280px;
      height: 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .nav-title {
      font-size: var(--typo-title-2xs);
      line-height: 24px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .nav-subtitle {
      margin-top: 1px;
      font-size: var(--typo-caption-s);
      line-height: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      display: block;
    }

    .icon-button,
    .file-action,
    .chip,
    .as-row,
    .btn-comp {
      position: relative;
      overflow: hidden;
    }

    .icon-button {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: var(--radius-full);
    }

    .icon-button:active::after,
    .file-action:active::after,
    .chip:active::after,
    .as-row:active::after,
    .btn-comp:active::after {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--feedback-press);
      border-radius: inherit;
      pointer-events: none;
    }

    .chat-scroll {
      position: absolute;
      left: 0;
      right: 0;
      top: 98px;
      bottom: 106px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: var(--spacing-xxl);
    }

    .message {
      width: var(--device-width);
      padding: var(--spacing-s) 0;
      display: flex;
    }

    .message .row {
      width: 404px;
      display: flex;
      gap: var(--spacing-s);
    }

    .message.guest .row {
      margin-left: var(--spacing-m);
      flex-direction: row;
    }

    .message.host .row {
      margin-left: var(--spacing-m);
      flex-direction: row-reverse;
    }

    .avatar {
      width: 40px;
      height: 40px;
      margin-top: var(--spacing-s);
      flex: 0 0 auto;
      border-radius: var(--radius-full);
    }

    .bubble-wrap {
      flex: 1;
      padding-top: var(--spacing-s);
      min-width: 0;
    }

    .bubble {
      max-width: 340px;
      border-radius: 10px;
      padding: 9px;
      font-size: var(--typo-body-l);
      line-height: 24px;
      font-weight: 400;
      word-wrap: break-word;
    }

    .guest .bubble {
      background: var(--bg-bottom);
      color: var(--text-primary);
    }

    .host .bubble {
      margin-left: auto;
      background: var(--brand-standard);
      color: var(--text-white);
    }

    .result-bubble {
      width: 316px;
      max-width: 316px;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }

    .agent-panel {
      width: 316px;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-m);
    }

    .agent-summary {
      background: var(--bg-bottom);
      border-radius: 10px;
      padding: var(--spacing-m);
    }

    .summary-top {
      display: flex;
      align-items: center;
      gap: var(--spacing-s);
    }

    .summary-top img {
      width: 28px;
      height: 28px;
      flex: 0 0 auto;
    }

    .summary-title {
      font-size: var(--typo-title-2xs);
      line-height: 24px;
      font-weight: 500;
    }

    .summary-desc {
      margin-top: var(--spacing-xs);
      font-size: var(--typo-body-s);
      line-height: 20px;
      color: var(--text-secondary);
    }

    .mode-tabs {
      height: 36px;
      background: var(--fill-tertiary);
      border-radius: var(--radius-xl);
      padding: var(--spacing-xs);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-xs);
    }

    .mode-tab {
      border-radius: var(--radius-l);
      font-size: var(--typo-label-m);
      line-height: 28px;
      color: var(--text-secondary);
      text-align: center;
    }

    .mode-tab.active {
      background: var(--bg-bottom);
      color: var(--text-primary);
      font-weight: 500;
      box-shadow: var(--shadow-menu);
    }

    .result-view {
      display: none;
    }

    .result-view.active {
      display: block;
    }

    .file-card {
      width: 316px;
      border-radius: var(--radius-xxl);
      background: var(--bg-bottom);
      overflow: hidden;
    }

    .file-card-head {
      min-height: 76px;
      padding: var(--spacing-m) var(--spacing-l);
      display: flex;
      align-items: center;
      gap: var(--spacing-m);
    }

    .file-icon {
      width: 52px;
      height: 52px;
      border-radius: var(--radius-m);
      background: var(--brand-light);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .file-icon img {
      width: 28px;
      height: 28px;
    }

    .file-main {
      flex: 1;
      min-width: 0;
    }

    .file-title {
      font-size: var(--typo-title-2xs);
      line-height: 24px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-meta {
      margin-top: 2px;
      font-size: var(--typo-caption-m);
      line-height: 17px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .divider {
      height: 0.5px;
      background: var(--border-weak);
      margin: 0 var(--spacing-l);
    }

    .file-actions {
      height: 52px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .file-action {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: var(--text-primary);
      border-radius: 0;
    }

    .file-action img {
      width: 20px;
      height: 20px;
    }

    .file-action span {
      font-size: var(--typo-caption-m);
      line-height: 14px;
    }

    .list-card {
      width: 316px;
      background: var(--bg-bottom);
      border-radius: var(--radius-m);
      overflow: hidden;
    }

    .filter-row {
      display: flex;
      gap: var(--spacing-s);
      padding: 0 0 var(--spacing-s);
      overflow-x: auto;
    }

    .chip {
      flex: 0 0 auto;
      height: 32px;
      padding: 0 var(--spacing-m);
      border-radius: var(--radius-l);
      background: var(--bg-bottom);
      color: var(--text-secondary);
      font-size: var(--typo-label-m);
      white-space: nowrap;
    }

    .chip.active {
      background: var(--brand-light);
      color: var(--brand-standard);
    }

    .file-row {
      min-height: 72px;
      display: flex;
      align-items: center;
      gap: var(--spacing-m);
      padding: 0 var(--spacing-l);
      position: relative;
    }

    .file-row + .file-row::before {
      content: "";
      position: absolute;
      top: 0;
      left: var(--spacing-l);
      right: var(--spacing-l);
      height: 0.5px;
      background: var(--border-weak);
    }

    .checkbox {
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
    }

    .row-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-s);
      background: var(--fill-quaternary);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .row-icon img {
      width: 24px;
      height: 24px;
    }

    .multi-footer {
      margin-top: var(--spacing-m);
      display: flex;
      gap: var(--spacing-s);
    }

    .btn-comp {
      height: 40px;
      min-width: 92px;
      border-radius: var(--radius-m);
      padding: 0 var(--spacing-l);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--typo-label-m);
      font-weight: 500;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--brand-standard);
      color: var(--text-white);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-default);
    }

    .assistant-hint {
      font-size: var(--typo-caption-m);
      line-height: 17px;
      color: var(--text-secondary);
      padding: 0 var(--spacing-xs);
    }

    .aio-input {
      position: absolute;
      left: 0;
      bottom: var(--device-home-bar-height);
      width: var(--device-width);
      height: 72px;
      background: rgba(240, 240, 242, 0.72);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .aio-bar {
      width: 396px;
      min-height: 56px;
      border-radius: 24px;
      border: 0.5px solid var(--border-default);
      background: var(--bg-bottom);
      padding: 0 var(--spacing-m);
      display: flex;
      align-items: center;
      gap: var(--spacing-s);
    }

    .aio-input.generating .aio-bar {
      background: var(--brand-standard);
      border-color: var(--brand-standard);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
    }

    .aio-text {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: none;
      resize: none;
      height: 40px;
      line-height: 40px;
      color: var(--text-primary);
      background: transparent;
      font-size: var(--typo-body-l);
      overflow: hidden;
    }

    .aio-text::placeholder {
      color: var(--text-quaternary);
    }

    .aio-round {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: var(--icon-primary);
    }

    .aio-round.primary {
      background: var(--brand-standard);
    }

    .aio-round.primary img {
      filter: brightness(0) invert(1);
    }

    .aio-round img {
      width: 24px;
      height: 24px;
    }

    .wave {
      display: none;
      flex: 1;
      height: 28px;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .aio-input.generating .aio-text,
    .aio-input.generating .aio-round {
      display: none;
    }

    .aio-input.generating .wave {
      display: flex;
    }

    .wave span {
      width: 3px;
      height: 8px;
      border-radius: 2px;
      background: var(--text-white);
      animation: wave 1500ms ease-in-out infinite;
    }

    .wave span:nth-child(2) { animation-delay: 120ms; }
    .wave span:nth-child(3) { animation-delay: 240ms; }
    .wave span:nth-child(4) { animation-delay: 360ms; }
    .wave span:nth-child(5) { animation-delay: 480ms; }

    @keyframes wave {
      0%, 100% { height: 8px; opacity: 0.72; }
      50% { height: 24px; opacity: 1; }
    }

    .home-bar {
      position: absolute;
      left: 0;
      bottom: 0;
      z-index: 20;
      width: var(--device-width);
      height: var(--device-home-bar-height);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: var(--spacing-s);
      pointer-events: none;
    }

    .home-bar-indicator {
      width: var(--device-home-bar-indicator-width);
      height: var(--device-home-bar-indicator-height);
      border-radius: var(--device-home-bar-indicator-radius);
      background: var(--text-primary);
    }

    .sheet-overlay {
      position: absolute;
      inset: 0;
      z-index: 12;
      background: var(--overlay-modal);
      opacity: 0;
      pointer-events: none;
      transition: opacity 250ms ease;
      display: flex;
      align-items: flex-end;
    }

    .sheet-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .actionsheet-outer {
      width: var(--device-width);
      min-height: 324px;
      background: var(--bg-secondary);
      border-top-left-radius: var(--radius-l);
      border-top-right-radius: var(--radius-l);
      overflow: hidden;
      transform: translateY(100%);
      transition: transform 420ms cubic-bezier(0.32, 0.72, 0.35, 1);
      padding-bottom: var(--device-home-bar-height);
    }

    .sheet-overlay.show .actionsheet-outer {
      transform: translateY(0);
    }

    .as-main-block,
    .as-cancel-block {
      background: var(--bg-bottom);
    }

    .as-cancel-block {
      margin-top: 10px;
    }

    .as-row {
      width: var(--device-width);
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      font-size: var(--typo-label-l);
      line-height: 22px;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .as-row + .as-row {
      border-top: 0.5px solid var(--border-weak);
    }

    .as-title {
      color: var(--text-secondary);
      font-size: var(--typo-caption-l);
    }

    .as-danger {
      color: var(--accent-red);
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 112px;
      z-index: 18;
      width: 396px;
      height: 52px;
      padding: 12px var(--spacing-l);
      border-radius: var(--radius-l);
      background: var(--fill-gray-primary);
      color: var(--text-white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-xs);
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(8px);
      transition: opacity 300ms ease, transform 300ms ease;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }

    .toast-main {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
      min-width: 0;
    }

    .toast-main img {
      width: 24px;
      height: 24px;
      filter: brightness(0) invert(1);
    }

    .toast-text {
      font-size: var(--typo-body-m);
      line-height: 22px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast-action {
      color: var(--brand-standard);
      font-size: var(--typo-label-m);
      line-height: 22px;
      white-space: nowrap;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="文件助手对话页">
    <div class="status-bar" aria-hidden="true">
      <div class="status-time">9:41</div>
      <div class="dynamic-island"></div>
      <div class="status-icons">
        <img src="icons/network.svg" alt="">
        <img src="icons/wifi.svg" alt="">
        <img src="icons/battery.svg" alt="">
      </div>
    </div>

    <nav class="navbar-row" aria-label="顶部导航">
      <div class="left-area">
        <button class="icon-button" type="button" aria-label="返回">
          <img class="nav-icon" src="icons/chevron_left.svg" alt="">
        </button>
      </div>
      <div class="middle-area">
        <div class="nav-title">文件助手</div>
        <div class="nav-subtitle">自然语言查找与操作</div>
      </div>
      <div class="right-area">
        <button class="icon-button" type="button" aria-label="更多操作" data-action="nav">
          <img class="nav-icon" src="icons/more_upright.svg" alt="">
        </button>
      </div>
    </nav>

    <section class="chat-scroll" id="chatScroll" aria-label="对话内容">
      <article class="message guest">
        <div class="row">
          <img class="avatar" src="icons/Avatar_40.svg" alt="">
          <div class="bubble-wrap">
            <div class="bubble">告诉我你记得的线索，比如发送人、群名、文件类型、时间，或直接说“找上周王老师发的课程设计文档”。</div>
          </div>
        </div>
      </article>

      <article class="message host">
        <div class="row">
          <img class="avatar" src="icons/Avatar_40.svg" alt="">
          <div class="bubble-wrap">
            <div class="bubble">帮我找上周王老师发的课程设计文档</div>
          </div>
        </div>
      </article>

      <article class="message guest">
        <div class="row">
          <img class="avatar" src="icons/Avatar_40.svg" alt="">
          <div class="bubble-wrap">
            <div class="bubble result-bubble">
              <div class="agent-panel">
                <section class="agent-summary">
                  <div class="summary-top">
                    <img src="icons/QUI_24_icons/agent.svg" alt="">
                    <div>
                      <div class="summary-title">已按“发送人 + 时间 + 文档类型”检索</div>
                      <div class="summary-desc">命中一个高置信文件，也找到一组相似文件，可继续打开、总结、分享或批量处理。</div>
                    </div>
                  </div>
                </section>

                <div class="mode-tabs" role="tablist" aria-label="结果类型">
                  <button class="mode-tab active" type="button" role="tab" aria-selected="true" data-mode="single">最可能 1 个</button>
                  <button class="mode-tab" type="button" role="tab" aria-selected="false" data-mode="multi">相关 12 个</button>
                </div>

                <section class="result-view active" data-view="single" aria-label="单个文件结果">
                  <div class="file-card">
                    <div class="file-card-head">
                      <div class="file-icon"><img src="icons/QUI_24_icons/qqdocs.svg" alt=""></div>
                      <div class="file-main">
                        <div class="file-title">课程设计说明书终版.docx</div>
                        <div class="file-meta">王老师 · 4月17日 20:31 · QQ群“软件工程课设”</div>
                      </div>
                    </div>
                    <div class="divider"></div>
                    <div class="file-actions" aria-label="文件操作">
                      <button class="file-action" type="button" data-action="打开"><img src="icons/QUI_24_icons/view_context.svg" alt=""><span>打开</span></button>
                      <button class="file-action" type="button" data-action="总结"><img src="icons/QUI_24_icons/ai_summary_new.svg" alt=""><span>总结</span></button>
                      <button class="file-action" type="button" data-action="分享"><img src="icons/QUI_24_icons/share.svg" alt=""><span>分享</span></button>
                      <button class="file-action" type="button" data-action="更多"><img src="icons/QUI_24_icons/more.svg" alt=""><span>更多</span></button>
                    </div>
                  </div>
                </section>

                <section class="result-view" data-view="multi" aria-label="多个文件结果">
                  <div class="filter-row" aria-label="筛选条件">
                    <button class="chip active" type="button">全部</button>
                    <button class="chip" type="button">文档</button>
                    <button class="chip" type="button">图片</button>
                    <button class="chip" type="button">本周</button>
                  </div>
                  <div class="list-card" role="list" aria-label="相关文件列表">
                    <button class="file-row" type="button" role="listitem" data-selectable>
                      <img class="checkbox" src="icons/Checkbox_filled.svg" alt="">
                      <div class="row-icon"><img src="icons/QUI_24_icons/files.svg" alt=""></div>
                      <div class="file-main">
                        <div class="file-title">课程设计说明书终版.docx</div>
                        <div class="file-meta">王老师 · 4月17日 · 1.8 MB</div>
                      </div>
                    </button>
                    <button class="file-row" type="button" role="listitem" data-selectable>
                      <img class="checkbox" src="icons/Checkbox.svg" alt="">
                      <div class="row-icon"><img src="icons/QUI_24_icons/folder.svg" alt=""></div>
                      <div class="file-main">
                        <div class="file-title">课程设计参考资料包</div>
                        <div class="file-meta">软件工程课设群 · 8 个文件</div>
                      </div>
                    </button>
                    <button class="file-row" type="button" role="listitem" data-selectable>
                      <img class="checkbox" src="icons/Checkbox.svg" alt="">
                      <div class="row-icon"><img src="icons/QUI_24_icons/files.svg" alt=""></div>
                      <div class="file-main">
                        <div class="file-title">需求分析模板.pdf</div>
                        <div class="file-meta">王老师 · 4月15日 · 642 KB</div>
                      </div>
                    </button>
                    <button class="file-row" type="button" role="listitem" data-selectable>
                      <img class="checkbox" src="icons/Checkbox.svg" alt="">
                      <div class="row-icon"><img src="icons/QUI_24_icons/files.svg" alt=""></div>
                      <div class="file-main">
                        <div class="file-title">答辩评分表.xlsx</div>
                        <div class="file-meta">群文件 · 4月14日 · 214 KB</div>
                      </div>
                    </button>
                  </div>
                  <div class="multi-footer">
                    <button class="btn-comp btn-primary" type="button" data-action="总结已选">总结已选</button>
                    <button class="btn-comp btn-secondary" type="button" data-action="批量转发">批量转发</button>
                  </div>
                </section>

                <p class="assistant-hint">也可以继续说：“只看 PDF”、“发给李明”或“把这些打包下载”。</p>
              </div>
            </div>
          </div>
        </div>
      </article>
    </section>

    <form class="aio-input" id="aioForm" aria-label="消息输入">
      <div class="aio-bar">
        <button class="aio-round" type="button" id="voiceButton" aria-label="切换语音输入">
          <img id="voiceIcon" src="icons/QUI_24_icons/microphone_on.svg" alt="">
        </button>
        <label class="sr-only" for="promptInput">输入查找文件的自然语言</label>
        <textarea class="aio-text" id="promptInput" rows="1" placeholder="说出或输入你要找的文件"></textarea>
        <button class="aio-round primary" type="submit" aria-label="发送">
          <img src="icons/QUI_24_icons/arrowhead_up.svg" alt="">
        </button>
      </div>
      <div class="wave" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </form>

    <div class="sheet-overlay" id="sheetOverlay" aria-hidden="true">
      <section class="actionsheet-outer" role="dialog" aria-modal="true" aria-label="文件操作">
        <div class="as-main-block">
          <div class="as-row as-title" id="sheetTitle">选择文件操作</div>
          <button class="as-row" type="button" data-sheet-action="打开文件">打开文件</button>
          <button class="as-row" type="button" data-sheet-action="AI 总结">AI 总结</button>
          <button class="as-row" type="button" data-sheet-action="转发给好友">转发给好友</button>
          <button class="as-row" type="button" data-sheet-action="保存到本机">保存到本机</button>
          <button class="as-row as-danger" type="button" data-sheet-action="移除记录">移除记录</button>
        </div>
        <div class="as-cancel-block">
          <button class="as-row" type="button" id="cancelSheet">取消</button>
        </div>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite">
      <div class="toast-main">
        <img src="icons/QUI_24_icons/tick_circle.svg" alt="">
        <span class="toast-text" id="toastText">已执行操作</span>
      </div>
      <button class="toast-action" type="button" id="toastUndo">撤销</button>
    </div>

    <div class="home-bar" aria-hidden="true">
      <div class="home-bar-indicator"></div>
    </div>
  </main>

  <script>
    const chatScroll = document.querySelector("#chatScroll");
    const aioForm = document.querySelector("#aioForm");
    const promptInput = document.querySelector("#promptInput");
    const voiceButton = document.querySelector("#voiceButton");
    const voiceIcon = document.querySelector("#voiceIcon");
    const sheetOverlay = document.querySelector("#sheetOverlay");
    const sheetTitle = document.querySelector("#sheetTitle");
    const cancelSheet = document.querySelector("#cancelSheet");
    const toast = document.querySelector("#toast");
    const toastText = document.querySelector("#toastText");
    let toastTimer;
    let voiceMode = false;

    function scrollToBottom() {
      chatScroll.scrollTop = chatScroll.scrollHeight;
    }

    function showToast(text) {
      window.clearTimeout(toastTimer);
      toastText.textContent = text;
      toast.classList.add("show");
      toastTimer = window.setTimeout(() => toast.classList.remove("show"), 3000);
    }

    function openSheet(title) {
      sheetTitle.textContent = title || "选择文件操作";
      sheetOverlay.classList.add("show");
      sheetOverlay.setAttribute("aria-hidden", "false");
    }

    function closeSheet() {
      sheetOverlay.classList.remove("show");
      sheetOverlay.setAttribute("aria-hidden", "true");
    }

    function makeMessage(role, content) {
      const article = document.createElement("article");
      article.className = `message ${role}`;
      article.innerHTML = `
        <div class="row">
          <img class="avatar" src="icons/Avatar_40.svg" alt="">
          <div class="bubble-wrap"><div class="bubble">${content}</div></div>
        </div>
      `;
      chatScroll.appendChild(article);
      scrollToBottom();
    }

    document.querySelectorAll(".mode-tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        const mode = tab.dataset.mode;
        document.querySelectorAll(".mode-tab").forEach((item) => {
          item.classList.toggle("active", item === tab);
          item.setAttribute("aria-selected", String(item === tab));
        });
        document.querySelectorAll(".result-view").forEach((view) => {
          view.classList.toggle("active", view.dataset.view === mode);
        });
      });
    });

    document.querySelectorAll("[data-selectable]").forEach((row) => {
      row.addEventListener("click", () => {
        const checkbox = row.querySelector(".checkbox");
        const selected = checkbox.getAttribute("src").includes("Checkbox_filled");
        checkbox.setAttribute("src", selected ? "icons/Checkbox.svg" : "icons/Checkbox_filled.svg");
      });
    });

    document.addEventListener("click", (event) => {
      const actionTarget = event.target.closest("[data-action]");
      if (!actionTarget) return;
      const action = actionTarget.dataset.action;
      if (action === "打开") {
        showToast("正在打开文件");
      } else if (action === "总结" || action === "总结已选") {
        showToast("已生成文件摘要");
      } else if (action === "分享" || action === "批量转发") {
        openSheet("选择分享方式");
      } else {
        openSheet("选择文件操作");
      }
    });

    sheetOverlay.addEventListener("click", (event) => {
      if (event.target === sheetOverlay) closeSheet();
    });

    cancelSheet.addEventListener("click", closeSheet);

    document.querySelectorAll("[data-sheet-action]").forEach((row) => {
      row.addEventListener("click", () => {
        closeSheet();
        showToast(`${row.dataset.sheetAction}已处理`);
      });
    });

    document.querySelector("#toastUndo").addEventListener("click", () => {
      toast.classList.remove("show");
      showToast("已撤销");
    });

    voiceButton.addEventListener("click", () => {
      voiceMode = !voiceMode;
      voiceIcon.setAttribute("src", voiceMode ? "icons/QUI_24_icons/keyboard_circle.svg" : "icons/QUI_24_icons/microphone_on.svg");
      promptInput.placeholder = voiceMode ? "按住说话，或点键盘输入" : "说出或输入你要找的文件";
      showToast(voiceMode ? "已切换到语音输入" : "已切换到文字输入");
    });

    aioForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = promptInput.value.trim() || (voiceMode ? "语音：找一下最近的项目文件" : "");
      if (!text) {
        showToast("先输入文件线索");
        return;
      }
      makeMessage("host", text.replace(/[<>&]/g, (char) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[char])));
      promptInput.value = "";
      aioForm.classList.add("generating");
      window.setTimeout(() => {
        aioForm.classList.remove("generating");
        const many = /全部|很多|一批|多个|所有|相关/.test(text);
        makeMessage("guest", many ? "我找到了多份相关文件，已按相关度排序。你可以勾选后批量总结、转发或下载。" : "我找到一个最可能的文件。如果不是它，可以点“相关 12 个”继续缩小范围。");
      }, 900);
    });

    scrollToBottom();
  </script>
</body>
</html>
